<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JurisTutor MZ</title>
    <link rel="icon" href="/public/favicon.ico">
  <link rel="stylesheet" href="/dist/output.css">
</head>
<body class="bg-gray-100 text-gray-900 font-sans">
  <div class="max-w-3xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-blue-700 mb-4">JurisTutor MZ</h1>
    <p class="mb-6">Digite o texto jurídico para análise:</p>

    <textarea id="entrada"
      class="w-full p-3 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
      placeholder="Exemplo: contrato de trabalho, cláusula de herança..."></textarea>

    <button id="btnAnalisar"
      class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
      Analisar Agora
    </button>

    <div id="resultado" class="mt-6 p-4 bg-white border rounded shadow"></div>
  </div>

  <script src="frontend.js"></script>
</body>
</html>
