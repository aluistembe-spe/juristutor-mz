<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JurisTutor MZ - Inteligência Jurídica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
    .legal-output b { color: #064e3b; font-weight: 700; }
    .legal-output i { color: #374151; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #059669; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-5xl w-full flex flex-col md:flex-row shadow-2xl rounded-3xl overflow-hidden border border-emerald-900/30">
    
    <div class="w-full md:w-80 bg-emerald-950 text-white p-10 flex flex-col justify-between">
      <div>
        <h1 class="text-3xl font-black text-emerald-400 tracking-tighter italic">JurisTutor MZ</h1>
        <p class="text-[10px] font-bold text-emerald-600 tracking-[0.3em] mb-12 uppercase">Consultoria Algorítmica</p>
        <div class="space-y-6">
          <div class="border-l-2 border-emerald-500 pl-4">
            <p class="text-xs text-emerald-200 leading-relaxed">
              Sistema treinado na <b>Constituição da República (CRM)</b>, <b>Código Civil</b> e na <b>Lei do Trabalho (13/2023)</b>.
            </p>
          </div>
        </div>
      </div>
      <div class="mt-8">
        <p class="text-[9px] text-emerald-700 uppercase font-bold tracking-widest text-center">Moçambique • 2026</p>
      </div>
    </div>

    <div class="flex-1 glass p-10">
      <header class="mb-10">
        <h2 class="text-2xl font-bold text-gray-900">Análise de Factos Jurídicos</h2>
        <p id="status-display" class="text-emerald-600 text-sm font-medium">Pronto para processar legislação moçambicana.</p>
      </header>

      <div class="relative mb-6">
        <textarea id="legal-input" 
          class="w-full h-48 p-6 bg-gray-50 border-2 border-gray-100 rounded-3xl focus:border-emerald-500 focus:bg-white outline-none text-gray-800 transition-all resize-none shadow-inner" 
          placeholder="Descreva o caso detalhadamente. Ex: Conflitos laborais, heranças, contratos..."></textarea>
      </div>
      
      <div id="result-box" class="hidden mb-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="p-6 bg-white border border-emerald-100 rounded-3xl shadow-sm text-gray-700 text-sm leading-relaxed legal-output custom-scrollbar overflow-y-auto max-h-96">
          <div></div>
        </div>
      </div>

      <button id="main-action-btn" 
        class="w-full py-5 bg-emerald-700 hover:bg-emerald-600 text-white font-black rounded-2xl transition-all shadow-xl hover:shadow-emerald-900/20 uppercase tracking-widest text-sm">
        Gerar Parecer Jurídico
      </button>
    </div>
  </div>

<script type="module">
  async function analisarAgora() {
    const input = document.getElementById('legal-input').value;
    const output = document.getElementById('result-box');
    const content = output?.querySelector('div');
    const btn = document.getElementById('main-action-btn');

    if (!input.trim()) return alert("Por favor, descreva o caso.");

    btn.innerText = "A PROCESSAR...";
    btn.disabled = true;
    output?.classList.remove('hidden');
    if (content) content.innerHTML = "<i>A consultar legislação moçambicana...</i>";

    try {
      const response = await fetch("/api/analisar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input })
      });
      const data = await response.json();

      if (content) {
        content.innerHTML = data.text
          .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
          .replace(/\n/g, '<br>');
      }
    } catch (error) {
      console.error("Erro detalhado:", error);
      if (content) content.innerHTML = "<b class='text-red-600'>Erro:</b> A ligação falhou.";
    } finally {
      btn.innerText = "Gerar Parecer Jurídico";
      btn.disabled = false;
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    const botao = document.getElementById('main-action-btn');
    if (botao) botao.onclick = analisarAgora;
  });
</script>
</body>
</html>
